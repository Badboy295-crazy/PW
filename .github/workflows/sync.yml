name: DeltaStudy Cookie Auto Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Scrape.do Turnstile Solver
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          SCRAPEDO_TOKEN: ${{ secrets.SCRAPEDO_TOKEN }}
        run: python auto_solve_scrape_do.py

      - name: Ping Mirror (keep Vercel warm)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://rangexcoder-study.vercel.app/")
          echo "Mirror ping status: $STATUS"
